name: Bug report
description: Report behavior that is broken, surprising, or unsafe.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Clear reproduction details make it much easier to fix the root cause.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
      placeholder: mark ... failed when ..., but I expected ...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include the exact commands and repository state needed to reproduce the issue.
      placeholder: |
        1. Run `mark ...`
        2. See ...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Paste output, errors, logs, or screenshots if relevant.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should mark have done?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Paste `mark --version`, a release version, or the commit SHA you tested.
      placeholder: mark 0.0.0 / abc1234
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did this happen?
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps explain the issue or its impact.
