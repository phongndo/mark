name: Build distribution assets

on:
  workflow_call:
    inputs:
      channel:
        description: Build channel (stable or nightly).
        required: true
        type: string
      release_tag:
        description: Version tag used in archive names.
        required: true
        type: string
      source_sha:
        description: Exact qualified source commit to build.
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - name: Checkout qualified source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.source_sha }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: dist-${{ matrix.target }}
          save-if: ${{ inputs.channel == 'nightly' }}

      - name: Configure nightly metadata
        if: inputs.channel == 'nightly'
        shell: bash
        run: |
          echo "MARK_BUILD_CHANNEL=nightly" >> "$GITHUB_ENV"
          echo "MARK_BUILD_COMMIT=${{ inputs.source_sha }}" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release -p mark-cli --locked --target ${{ matrix.target }}

      - name: Smoke binary
        shell: bash
        run: target/${{ matrix.target }}/release/mark --version

      - name: Package asset
        shell: bash
        run: |
          scripts/ci/package-dist \
            "${{ inputs.release_tag }}" \
            "${{ matrix.target }}" \
            "target/${{ matrix.target }}/release/mark" \
            "${{ inputs.source_sha }}"

      - name: Upload asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mark-${{ inputs.release_tag }}-${{ matrix.target }}
          if-no-files-found: error
          retention-days: 1
          path: |
            dist/*.tar.gz
            dist/*.sha256
