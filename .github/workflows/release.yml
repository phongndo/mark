name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Expected workspace version. Leave empty to use Cargo.toml.
        required: false
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Qualify release source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      source_sha: ${{ steps.release.outputs.source_sha }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate version and source
        id: release
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          EXPECTED_VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          version="$(
            cargo metadata --locked --format-version 1 --no-deps |
              python3 -c 'import json, sys; print(next(package["version"] for package in json.load(sys.stdin)["packages"] if package["name"] == "mark-cli"))'
          )"
          if [[ -n "$EXPECTED_VERSION" && "$EXPECTED_VERSION" != "$version" ]]; then
            echo "workflow input version $EXPECTED_VERSION does not match mark-cli version $version" >&2
            exit 1
          fi

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            release_tag="$GITHUB_REF_NAME"
            if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "invalid release tag: $release_tag" >&2
              exit 1
            fi
            git fetch --quiet origin "$DEFAULT_BRANCH"
            if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/$DEFAULT_BRANCH"; then
              echo "release commit $GITHUB_SHA is not reachable from $DEFAULT_BRANCH" >&2
              exit 1
            fi
          else
            expected_ref="refs/heads/$DEFAULT_BRANCH"
            if [[ "$GITHUB_REF" != "$expected_ref" ]]; then
              echo "manual releases must run from $expected_ref" >&2
              exit 1
            fi
            main_sha="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/$DEFAULT_BRANCH" --jq .object.sha)"
            if [[ "$GITHUB_SHA" != "$main_sha" ]]; then
              echo "manual release source $GITHUB_SHA is not the current $DEFAULT_BRANCH tip $main_sha" >&2
              exit 1
            fi
            release_tag="v$version"
          fi

          if [[ "${release_tag#v}" != "$version" ]]; then
            echo "release tag $release_tag does not match mark-cli version $version" >&2
            exit 1
          fi
          if tag_sha="$(gh api "repos/$GITHUB_REPOSITORY/commits/$release_tag" --jq .sha 2>/dev/null)" && \
             [[ "$tag_sha" != "$GITHUB_SHA" ]]; then
            echo "existing tag $release_tag points to $tag_sha, not qualified source $GITHUB_SHA" >&2
            exit 1
          fi

          gh api \
            "repos/$GITHUB_REPOSITORY/actions/workflows/quality.yml/runs?head_sha=$GITHUB_SHA&status=success&per_page=100" |
            scripts/ci/verify-workflow-run.py \
              --sha "$GITHUB_SHA" \
              --branch "$DEFAULT_BRANCH" \
              --event push

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "source_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    name: Build release assets
    needs: prepare
    uses: ./.github/workflows/build-dist.yml
    with:
      channel: stable
      release_tag: ${{ needs.prepare.outputs.release_tag }}
      source_sha: ${{ needs.prepare.outputs.source_sha }}

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true

      - name: Verify release assets
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(find dist -maxdepth 1 -name '*.tar.gz' | wc -l)" -eq 4 ]]
          [[ "$(find dist -maxdepth 1 -name '*.sha256' | wc -l)" -eq 4 ]]
          (cd dist && sha256sum --check ./*.sha256)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          cat > release-notes.md <<EOF
          Release $RELEASE_TAG.

          Source: $SOURCE_SHA

          Install with curl:

          \`\`\`sh
          curl -fsSL https://raw.githubusercontent.com/phongndo/mark/main/scripts/install.sh | sh
          \`\`\`
          EOF

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/*.tar.gz dist/*.sha256 \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --latest \
              --notes-file release-notes.md \
              --title "mark $VERSION"
          else
            create_args=(--target "$SOURCE_SHA")
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
              create_args=(--verify-tag)
            fi
            gh release create "$RELEASE_TAG" dist/*.tar.gz dist/*.sha256 \
              --repo "$GITHUB_REPOSITORY" \
              "${create_args[@]}" \
              --latest \
              --title "mark $VERSION" \
              --notes-file release-notes.md
          fi
