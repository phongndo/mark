name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      - name: Read package version
        id: package
        shell: bash
        run: |
          version="$(
            cargo metadata --locked --format-version 1 --no-deps \
              | python3 -c 'import json, sys; print(next(package["version"] for package in json.load(sys.stdin)["packages"] if package["name"] == "dx-cli"))'
          )"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$tag_version" != "${{ steps.package.outputs.version }}" ]; then
            echo "tag version $tag_version does not match dx-cli version ${{ steps.package.outputs.version }}" >&2
            exit 1
          fi

      - name: Test
        run: cargo test --workspace --all-targets --all-features --locked --target ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p dx-cli --locked --target ${{ matrix.target }}

      - name: Package release asset
        shell: bash
        run: |
          version="${{ steps.package.outputs.version }}"
          package="dx-v${version}-${{ matrix.target }}"
          binary="target/${{ matrix.target }}/release/dx"
          asset="dist/${package}.tar.gz"

          test -x "$binary"
          mkdir -p "dist/$package"
          install -m 755 "$binary" "dist/$package/dx"
          cp README.md LICENSE "dist/$package/"
          tar -czf "$asset" -C dist "$package"

          if command -v shasum >/dev/null 2>&1; then
            (cd dist && shasum -a 256 "${package}.tar.gz" > "${package}.tar.gz.sha256")
          else
            (cd dist && sha256sum "${package}.tar.gz" > "${package}.tar.gz.sha256")
          fi

      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: dx-${{ matrix.target }}
          if-no-files-found: error
          path: |
            dist/*.tar.gz
            dist/*.sha256

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="$(
            sed -n '/^\[workspace.package\]/,/^\[/{s/^version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p;}' Cargo.toml \
              | head -n 1
          )"
          if [ -z "$version" ]; then
            echo "could not read workspace package version" >&2
            exit 1
          fi

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            release_tag="$GITHUB_REF_NAME"
            create_tag_args=(--verify-tag)
          else
            release_tag="v$version"
            create_tag_args=(--target "$GITHUB_SHA")
          fi

          tag_version="${release_tag#v}"
          if [ "$tag_version" != "$version" ]; then
            echo "release tag $release_tag does not match dx-cli version $version" >&2
            exit 1
          fi

          cat > release-notes.md <<EOF
          Release $release_tag.

          Install with Homebrew:

          \`\`\`sh
          brew install phongndo/tap/dx-cli
          \`\`\`

          Install with mise:

          \`\`\`sh
          mise use -g github:phongndo/dx@$version
          \`\`\`
          EOF

          if gh release view "$release_tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$release_tag" dist/*.tar.gz dist/*.sha256 \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$release_tag" dist/*.tar.gz dist/*.sha256 \
              --repo "$GITHUB_REPOSITORY" \
              "${create_tag_args[@]}" \
              --title "dx $version" \
              --notes-file release-notes.md
          fi

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not configured; skipping Homebrew tap update" >&2
            exit 0
          fi

          version="$(
            sed -n '/^\[workspace.package\]/,/^\[/{s/^version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p;}' Cargo.toml \
              | head -n 1
          )"
          if [ -z "$version" ]; then
            echo "could not read workspace package version" >&2
            exit 1
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          gh repo clone phongndo/homebrew-tap homebrew-tap
          scripts/render-homebrew-formula "$version" dist homebrew-tap/Formula/dx-cli.rb

          cd homebrew-tap
          if git diff --quiet -- Formula/dx-cli.rb; then
            echo "Homebrew formula is already up to date"
            exit 0
          fi

          git add Formula/dx-cli.rb
          git commit -m "Update dx-cli to $version"
          git push
