name: Nightly

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: nightly
  cancel-in-progress: false

env:
  NIGHTLY_TAG: vnightly

jobs:
  prepare:
    name: Qualify nightly source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      source_sha: ${{ steps.source.outputs.source_sha }}

    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Require current CI-qualified main
        id: source
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          expected_ref="refs/heads/$DEFAULT_BRANCH"
          if [[ "$GITHUB_REF" != "$expected_ref" ]]; then
            echo "nightly must run from $expected_ref" >&2
            exit 1
          fi
          main_sha="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/$DEFAULT_BRANCH" --jq .object.sha)"
          if [[ "$GITHUB_SHA" != "$main_sha" ]]; then
            echo "nightly source $GITHUB_SHA is not the current $DEFAULT_BRANCH tip $main_sha" >&2
            exit 1
          fi

          gh api \
            "repos/$GITHUB_REPOSITORY/actions/workflows/quality.yml/runs?head_sha=$GITHUB_SHA&status=success&per_page=100" |
            scripts/ci/verify-workflow-run.py \
              --sha "$GITHUB_SHA" \
              --branch "$DEFAULT_BRANCH" \
              --event push

          echo "source_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

  build:
    name: Build nightly assets
    needs: prepare
    uses: ./.github/workflows/build-dist.yml
    with:
      channel: nightly
      release_tag: vnightly
      source_sha: ${{ needs.prepare.outputs.source_sha }}

  publish:
    name: Publish nightly release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: nightly
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download nightly assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true

      - name: Verify nightly assets
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(find dist -maxdepth 1 -name '*.tar.gz' | wc -l)" -eq 4 ]]
          [[ "$(find dist -maxdepth 1 -name '*.sha256' | wc -l)" -eq 4 ]]
          (cd dist && sha256sum --check ./*.sha256)

      - name: Publish mutable nightly release
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
        shell: bash
        run: |
          set -euo pipefail

          cat > release-notes.md <<EOF
          Nightly build from CI-qualified main.

          Commit: $SOURCE_SHA

          Switch mark to nightly:

          \`\`\`sh
          curl -fsSL https://raw.githubusercontent.com/phongndo/mark/main/scripts/install.sh | MARK_VERSION=nightly sh
          \`\`\`

          Switch back to stable:

          \`\`\`sh
          mark update
          \`\`\`
          EOF

          if gh release view "$NIGHTLY_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$NIGHTLY_TAG" dist/*.tar.gz dist/*.sha256 \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit "$NIGHTLY_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --prerelease \
              --target "$SOURCE_SHA" \
              --title "mark nightly" \
              --notes-file release-notes.md
            if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$NIGHTLY_TAG" >/dev/null 2>&1; then
              gh api -X PATCH "repos/$GITHUB_REPOSITORY/git/refs/tags/$NIGHTLY_TAG" \
                -f sha="$SOURCE_SHA" \
                -F force=true >/dev/null
            else
              gh api -X POST "repos/$GITHUB_REPOSITORY/git/refs" \
                -f ref="refs/tags/$NIGHTLY_TAG" \
                -f sha="$SOURCE_SHA" >/dev/null
            fi
          else
            gh release create "$NIGHTLY_TAG" dist/*.tar.gz dist/*.sha256 \
              --repo "$GITHUB_REPOSITORY" \
              --target "$SOURCE_SHA" \
              --prerelease \
              --latest=false \
              --title "mark nightly" \
              --notes-file release-notes.md
          fi
