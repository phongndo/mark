name: Publish pi-mark

on:
  workflow_dispatch:
    inputs:
      version:
        description: Expected pi-mark package version. Leave empty to use pi-mark/package.json.
        required: false
        type: string
      npm_tag:
        description: npm dist-tag to publish under.
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
          - beta
          - dev
      create_github_release:
        description: Create a pi-mark-vX.Y.Z GitHub release after publishing.
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: pi-mark-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish pi-mark to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pi-mark/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: pi-mark
        run: pnpm install --frozen-lockfile

      - name: Check pi-mark
        working-directory: pi-mark
        run: pnpm run check

      - name: Read package metadata
        id: package
        working-directory: pi-mark
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          expected="$EXPECTED_VERSION"

          if [ -n "$expected" ] && [ "$expected" != "$version" ]; then
            echo "workflow input version $expected does not match pi-mark/package.json version $version" >&2
            exit 1
          fi

          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "${name}@${version} is already published on npm" >&2
            exit 1
          fi

          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        working-directory: pi-mark
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
        run: pnpm publish --registry https://registry.npmjs.org --access public --tag "$NPM_TAG" --provenance --no-git-checks

      - name: Create GitHub release
        if: inputs.create_github_release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          VERSION: ${{ steps.package.outputs.version }}
          NPM_TAG: ${{ inputs.npm_tag }}
        shell: bash
        run: |
          set -euo pipefail
          release_tag="pi-mark-v${VERSION}"

          cat > release-notes.md <<EOF
          Release ${PACKAGE_NAME}@${VERSION}.

          Install with Pi:

          \`\`\`sh
          pi install npm:${PACKAGE_NAME}@${VERSION}
          \`\`\`

          npm dist-tag: ${NPM_TAG}
          EOF

          gh release create "$release_tag" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --latest=false \
            --title "pi-mark ${VERSION}" \
            --notes-file release-notes.md
