name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ACTIONLINT_VERSION: 1.7.12
  CARGO_TERM_COLOR: always
  TSLP_VERSION: 1.9.0-rc.18

jobs:
  actionlint:
    name: GitHub Actions workflow lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.11"
          cache: false

      - name: Install actionlint
        run: |
          set -eu
          mkdir -p "$RUNNER_TEMP/actionlint"
          GOBIN="$RUNNER_TEMP/actionlint" \
            go install "github.com/rhysd/actionlint/cmd/actionlint@v${ACTIONLINT_VERSION}"
          echo "$RUNNER_TEMP/actionlint" >> "$GITHUB_PATH"

      - name: Lint workflows
        run: actionlint -color

  rust-analyzer:
    name: Rust analyzer diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer

      - name: Run rust-analyzer diagnostics
        run: rust-analyzer diagnostics .

  msrv:
    name: MSRV (Rust 1.85)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85

      - name: Fetch tree-sitter parser source bundle
        uses: ./.github/actions/fetch-parser-bundle
        with:
          tslp-version: ${{ env.TSLP_VERSION }}
          github-token: ${{ github.token }}
          target-dir: .cache/tree-sitter-language-pack

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Check MSRV
        run: cargo check --workspace --all-targets --all-features --locked

  quality:
    name: Formatter, linter, tests, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Fetch tree-sitter parser source bundle
        uses: ./.github/actions/fetch-parser-bundle
        with:
          tslp-version: ${{ env.TSLP_VERSION }}
          github-token: ${{ github.token }}
          target-dir: .cache/tree-sitter-language-pack

      - name: Check
        run: cargo check --workspace --all-targets --all-features --locked

      - name: Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets --all-features --locked

      - name: Benchmark smoke
        run: |
          cargo run -p mark-bench --locked -- fixtures \
            --out "$RUNNER_TEMP/mark-bench" \
            --scenario many-small-files \
            --force
          cargo run -p mark-bench --locked -- measure \
            --fixtures "$RUNNER_TEMP/mark-bench" \
            --scenario many-small-files \
            --json

      - name: Build
        run: cargo build --workspace --all-targets --all-features --locked

      - name: Smoke installer and update
        run: scripts/smoke-installer-update

  pi-mark:
    name: pi-mark package quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pi-mark/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: pi-mark
        run: pnpm install --frozen-lockfile

      - name: Check pi-mark
        working-directory: pi-mark
        run: pnpm run check
