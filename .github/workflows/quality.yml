name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ACTIONLINT_VERSION: 1.7.12
  CARGO_TERM_COLOR: always

jobs:
  actionlint:
    name: GitHub Actions workflow lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.11"
          cache: false

      - name: Install actionlint
        run: |
          set -eu
          mkdir -p "$RUNNER_TEMP/actionlint"
          GOBIN="$RUNNER_TEMP/actionlint" \
            go install "github.com/rhysd/actionlint/cmd/actionlint@v${ACTIONLINT_VERSION}"
          echo "$RUNNER_TEMP/actionlint" >> "$GITHUB_PATH"

      - name: Lint workflows
        run: actionlint -color

  rust-analyzer:
    name: Rust analyzer diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer

      - name: Run rust-analyzer diagnostics
        run: rust-analyzer diagnostics .

  msrv:
    name: MSRV (Rust 1.88)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@1.88

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Check MSRV
        run: cargo check --workspace --all-targets --all-features --locked

  quality:
    name: Formatter, linter, tests, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MARK_TEXTMATE_STRICT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install pinned TextMate oracle
        run: npm ci --prefix tools/golden-oracle

      - name: Check
        run: cargo check --workspace --all-targets --all-features --locked

      - name: Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Test
        # The two catalog-wide loops run in the shard matrix below. Keep the
        # remaining unit, integration, and TextMate regression tests here.
        run: |
          cargo test --workspace --all-targets --all-features --locked -- \
            --skip manifest_golden_cases_match_or_are_allowlisted \
            --skip manifest_golden_cases_have_no_budget_degradation

      - name: Architecture boundaries
        run: scripts/check-architecture

      - name: Python tool tests
        run: python3 -m unittest discover -s tools -p 'test_*.py'

      - name: Locked TextMate 254/254 contract
        run: |
          node tools/vendor-shiki-grammars.mjs --check
          node --test tools/test-generate-textmate-cases.mjs
          node tools/generate-textmate-cases.mjs --check
          python3 tools/build-textmate-corpora.py --check
          python3 tools/generate-language-status.py --check

      - name: Startup latency
        run: |
          cargo build -p mark-cli --release --locked
          scripts/check-startup target/release/mark 2.0

      - name: Golden oracle check
        run: |
          node tools/generate-goldens.mjs --check
          node tools/regex-conformance.mjs
          node --test tools/test-grammar-stats.mjs
          node tools/grammar-stats.mjs --fail-on-gaps --examples 0 > /tmp/grammar-gaps.json
          python3 tools/check-language-docs.py --check

      - name: Benchmark smoke
        run: |
          cargo run -p mark-bench --locked -- fixtures \
            --out "$RUNNER_TEMP/mark-bench" \
            --scenario many-small-files \
            --force
          cargo run -p mark-bench --locked -- measure \
            --fixtures "$RUNNER_TEMP/mark-bench" \
            --scenario many-small-files \
            --json

      - name: Mega-diff RSS smoke
        run: |
          cargo run -p mark-bench --locked -- fixtures \
            --out "$RUNNER_TEMP/mark-bench-mega" \
            --scenario mega-diff-1m \
            --force
          cargo run -p mark-bench --locked -- measure \
            --fixtures "$RUNNER_TEMP/mark-bench-mega" \
            --scenario mega-diff-1m \
            --max-scroll-steps 20 \
            --assert-max-rss-ratio 3.0 \
            --json

      # Bundle size is deterministic; absolute decode latency is reference-machine
      # only (shared CI runners are too variable — see catalog perf floor).
      - name: Bundle size smoke
        run: |
          cargo run -p mark-syntax --locked --release --example bundle-measure -- \
            --assert-max-bundle-bytes 9000000

      - name: TextMate engine throughput smoke
        run: |
          cargo run -p mark-syntax --locked --release --example profile-cold -- \
            --mode process-cold \
            --assets assets/tm-grammars/languages \
            --scope source.rust \
            --assert-min-mb-s 0.05 \
            crates/mark-syntax/tests/fixtures/textmate/rust/stress.rs \
            1

      - name: Build
        run: cargo build --workspace --all-targets --all-features --locked

      - name: Smoke installer and update
        run: scripts/smoke-installer-update

  textmate-golden:
    name: TextMate golden shard ${{ matrix.shard }}/4
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    env:
      MARK_TEXTMATE_STRICT: "1"
      MARK_TEXTMATE_SHARD_INDEX: ${{ matrix.shard }}
      MARK_TEXTMATE_SHARD_TOTAL: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run golden shard
        run: cargo test -p mark-syntax --test textmate_golden --locked manifest_golden_cases_

  pi-mark:
    name: pi-mark package quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pi-mark/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: pi-mark
        run: pnpm install --frozen-lockfile

      - name: Check pi-mark
        working-directory: pi-mark
        run: pnpm run check
