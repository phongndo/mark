name: CI

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  ACTIONLINT_VERSION: 1.7.12
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Classify changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      rust: ${{ steps.classify.outputs.rust }}
      syntax: ${{ steps.classify.outputs.syntax }}
      generated: ${{ steps.classify.outputs.generated }}
      performance: ${{ steps.classify.outputs.performance }}
      pi: ${{ steps.classify.outputs.pi }}
      workflows: ${{ steps.classify.outputs.workflows }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Classify impacted lanes
        id: classify
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
        run: scripts/ci/changes.py

  workflow-lint:
    name: Workflow lint
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.11"
          cache: false

      - name: Install actionlint
        run: |
          set -eu
          mkdir -p "$RUNNER_TEMP/actionlint"
          GOBIN="$RUNNER_TEMP/actionlint" \
            go install "github.com/rhysd/actionlint/cmd/actionlint@v${ACTIONLINT_VERSION}"
          echo "$RUNNER_TEMP/actionlint" >> "$GITHUB_PATH"

      - name: Lint workflows
        run: actionlint -color

  rust:
    name: Rust correctness
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MARK_TEXTMATE_STRICT: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Run Rust suite
        run: scripts/ci/rust

  msrv:
    name: MSRV (Rust 1.88)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.88"

      - name: Restore MSRV cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: msrv
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check MSRV
        run: cargo check --workspace --all-targets --all-features --locked

  generated:
    name: Generated and oracle contracts
    needs: changes
    if: needs.changes.outputs.generated == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: tools/golden-oracle/package-lock.json

      - name: Run generated and oracle suite
        run: scripts/ci/generated

  textmate-golden:
    name: TextMate golden shard ${{ matrix.shard }}/4
    needs: changes
    if: needs.changes.outputs.syntax == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    env:
      MARK_TEXTMATE_STRICT: "1"
      MARK_TEXTMATE_SHARD_INDEX: ${{ matrix.shard }}
      MARK_TEXTMATE_SHARD_TOTAL: "4"

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable

      - name: Run golden shard
        run: cargo test -p mark-syntax --test textmate_golden --locked manifest_golden_cases_

  performance:
    name: Deterministic performance smoke
    needs: changes
    if: needs.changes.outputs.performance == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable

      - name: Run performance smoke suite
        run: scripts/ci/performance smoke

  pi-mark:
    name: pi-mark package quality
    needs: changes
    if: needs.changes.outputs.pi == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pi-mark/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: pi-mark
        run: pnpm install --frozen-lockfile

      - name: Check pi-mark
        working-directory: pi-mark
        run: pnpm run check

  gate:
    name: CI gate
    needs:
      - changes
      - workflow-lint
      - rust
      - msrv
      - generated
      - textmate-golden
      - performance
      - pi-mark
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Require every selected lane
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          WORKFLOW_SELECTED: ${{ needs.changes.outputs.workflows }}
          WORKFLOW_RESULT: ${{ needs.workflow-lint.result }}
          RUST_SELECTED: ${{ needs.changes.outputs.rust }}
          RUST_RESULT: ${{ needs.rust.result }}
          MSRV_RESULT: ${{ needs.msrv.result }}
          GENERATED_SELECTED: ${{ needs.changes.outputs.generated }}
          GENERATED_RESULT: ${{ needs.generated.result }}
          SYNTAX_SELECTED: ${{ needs.changes.outputs.syntax }}
          TEXTMATE_RESULT: ${{ needs.textmate-golden.result }}
          PERFORMANCE_SELECTED: ${{ needs.changes.outputs.performance }}
          PERFORMANCE_RESULT: ${{ needs.performance.result }}
          PI_SELECTED: ${{ needs.changes.outputs.pi }}
          PI_RESULT: ${{ needs.pi-mark.result }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$CHANGES_RESULT" != success ]]; then
            echo "::error::change classification ended with $CHANGES_RESULT"
            exit 1
          fi

          failed=0
          for entry in \
            "workflow-lint:$WORKFLOW_SELECTED:$WORKFLOW_RESULT" \
            "rust:$RUST_SELECTED:$RUST_RESULT" \
            "msrv:$RUST_SELECTED:$MSRV_RESULT" \
            "generated:$GENERATED_SELECTED:$GENERATED_RESULT" \
            "textmate:$SYNTAX_SELECTED:$TEXTMATE_RESULT" \
            "performance:$PERFORMANCE_SELECTED:$PERFORMANCE_RESULT" \
            "pi-mark:$PI_SELECTED:$PI_RESULT"
          do
            name="${entry%%:*}"
            remainder="${entry#*:}"
            selected="${remainder%%:*}"
            result="${remainder#*:}"
            if [[ "$selected" == true && "$result" != success ]]; then
              echo "::error::$name was selected but ended with $result"
              failed=1
            elif [[ "$selected" != true && "$result" != skipped && "$result" != success ]]; then
              echo "::error::$name unexpectedly ended with $result"
              failed=1
            fi
          done
          exit "$failed"
