# Apache basics: café λ 東京 🚀 𝌆
ServerName example.test
ServerAdmin ops@example.test
Listen 8080
DocumentRoot "/srv/www/café-東京"
ErrorLog logs/basic-error.log
LogLevel warn

<Directory "/srv/www/café-東京">
    Options Indexes FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

<IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteCond %{REQUEST_URI} ^/old/(.*)$
    RewriteRule ^old/(.*)$ /new/$1 [R=301,L]
</IfModule>

<FilesMatch "\\.(png|jpg)$">
    Header set X-Fixture "λ-🚀-𝌆"
</FilesMatch>

Redirect temp /legacy /modern
