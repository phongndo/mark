# Apache TextMate stress fixture: café λ 東京 🚀 𝌆
# Sections and directives are deliberately balanced through end of file.
ServerRoot "/etc/httpd"
ServerName atlas.example.test
ServerAdmin ops@example.test
ServerTokens Prod
ServerSignature Off
UseCanonicalName Off
TraceEnable Off
HostnameLookups Off
Listen 80
Listen 443
PidFile /run/httpd-atlas.pid
Mutex file:/run/httpd default
User www-data
Group www-data

# Modules and process controls
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule headers_module modules/mod_headers.so
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule ssl_module modules/mod_ssl.so
StartServers 2
MinSpareServers 2
MaxSpareServers 8
ServerLimit 16
MaxRequestWorkers 256
MaxConnectionsPerChild 10000
KeepAlive On
MaxKeepAliveRequests 200
KeepAliveTimeout 4
Timeout 60
LimitRequestBody 10485760
LimitRequestFields 80
LimitRequestFieldSize 8190
LimitRequestLine 8190

# Paths, logging, and MIME handling
DocumentRoot "/srv/atlas/public"
DirectoryIndex index.html index.htm
AccessFileName .htaccess
TypesConfig conf/mime.types
DefaultType application/octet-stream
AddDefaultCharset UTF-8
AddType application/json .json
AddType text/plain .txt .log
AddCharset UTF-8 .html .css
AddEncoding gzip .gz
AddLanguage ja .ja
ErrorLog logs/error.log
LogLevel warn
LogFormat "%h %l %u %t \"%r\" %>s %b" combined
LogFormat "%{Referer}i -> %U" referer
CustomLog logs/access.log combined
BufferedLogs On
IncludeOptional conf.d/*.conf

# Environment and response metadata
Define ATLAS_ROOT /srv/atlas
SetEnv APP_MODE production
PassEnv LANG
UnsetEnv DEBUG_SECRET
SetEnvIf Request_URI "^/api/" api_request=1
SetEnvIfNoCase User-Agent "robot|crawler" is_bot=1
BrowserMatch "Mozilla/4" legacy_browser
Header always set X-Content-Type-Options "nosniff"
Header set X-Unicode "café λ 東京 🚀 𝌆"
RequestHeader set X-Forwarded-Proto "https"
ExpiresActive On
ExpiresDefault "access plus 1 hour"
ExpiresByType image/png "access plus 1 month"

<Directory "/srv/atlas/public">
    Options FollowSymLinks MultiViews
    AllowOverride FileInfo AuthConfig
    DirectoryIndex index.html
    Require all granted
    AddOutputFilterByType DEFLATE text/html text/plain text/css
    <FilesMatch "^\\.(env|git)">
        Require all denied
    </FilesMatch>
    <LimitExcept GET POST HEAD>
        Require all denied
    </LimitExcept>
</Directory>

<DirectoryMatch "^/srv/atlas/users/[a-z]+/public$">
    Options Indexes
    IndexOptions FancyIndexing HTMLTable NameWidth=*
    IndexIgnore .??* *~ *#
    HeaderName HEADER.html
    ReadmeName README.html
    Require all granted
</DirectoryMatch>

Alias /assets/ "/srv/atlas/shared/assets/"
AliasMatch "^/icons/(.*)" "/srv/atlas/icons/$1"
ScriptAlias /cgi-bin/ "/srv/atlas/cgi-bin/"
ScriptAliasMatch "^/tools/(.*)" "/srv/atlas/tools/$1"
Redirect permanent /documentation https://docs.example.test/
RedirectMatch 301 "^/v1/(.*)$" "/v2/$1"
RedirectPermanent /retired https://example.test/gone
RedirectTemp /preview https://preview.example.test/

<IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteBase /
    RewriteCond %{HTTPS} !=on
    RewriteCond %{HTTP_HOST} ^www\\.(.+)$ [NC]
    RewriteRule ^/(.*)$ https://%1/$1 [R=301,L]
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^api/(.*)$ index.php?route=$1 [QSA,L]
    RewriteRule ^unicode$ /café/東京 [PT,L]
</IfModule>

<IfModule mod_proxy.c>
    ProxyRequests Off
    ProxyPreserveHost On
    ProxyTimeout 30
    ProxyPass /api/ http://127.0.0.1:9000/
    ProxyPassReverse /api/ http://127.0.0.1:9000/
    ProxyPassMatch "^/socket/(.*)$" "ws://127.0.0.1:9001/$1"
    NoProxy localhost 127.0.0.1
    <Proxy "balancer://atlas">
        BalancerMember http://127.0.0.1:9101 route=one
        BalancerMember http://127.0.0.1:9102 route=two
        Require all granted
    </Proxy>
</IfModule>

<Location "/health">
    SetHandler server-status
    Require local
</Location>

<LocationMatch "^/(metrics|status)$">
    AuthType Basic
    AuthName "Atlas operators"
    AuthBasicProvider file
    AuthUserFile /etc/httpd/users
    Require valid-user
</LocationMatch>

<IfDefine TLS_ENABLED>
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5
    SSLHonorCipherOrder On
    SSLSessionCache shmcb:/run/httpd/sslcache(512000)
    SSLSessionCacheTimeout 300
    SSLUseStapling On
</IfDefine>

<IfVersion >= 2.4>
    Protocols h2 http/1.1
    RequestReadTimeout header=20-40,MinRate=500 body=20,MinRate=500
</IfVersion>

<VirtualHost *:80>
    ServerName www.example.test
    ServerAlias example.test café.example.test
    Redirect permanent / https://www.example.test/
    ErrorDocument 404 /errors/not-found.html
</VirtualHost>

<VirtualHost *:443>
    ServerName www.example.test
    DocumentRoot "/srv/atlas/public"
    ErrorLog logs/tls-error.log
    CustomLog logs/tls-access.log combined
    SSLEngine On
    SSLCertificateFile /etc/pki/tls/certs/atlas.pem
    SSLCertificateKeyFile /etc/pki/tls/private/atlas.key
    SSLVerifyClient optional
    SSLVerifyDepth 2
    <Files "admin.php">
        Require group operators
    </Files>
    <Location "/private">
        AuthType Basic
        AuthName "Private 東京"
        Require valid-user
    </Location>
</VirtualHost>

<If "%{REQUEST_METHOD} == 'OPTIONS'">
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, POST, OPTIONS"
</If>
<ElseIf "%{REQUEST_URI} =~ m#^/legacy#">
    Header set X-Legacy "true"
</ElseIf>
<Else>
    Header set X-Route "default"
</Else>

<Macro Tenant $name $root>
    <VirtualHost *:8080>
        ServerName $name.example.test
        DocumentRoot "$root"
        <Directory "$root">
            Require all granted
        </Directory>
    </VirtualHost>
</Macro>
Use Tenant demo /srv/tenants/demo

CacheEnable disk /
CacheRoot /var/cache/httpd
CacheDefaultExpire 3600
DeflateCompressionLevel 6
FilterDeclare COMPRESS
FilterProvider COMPRESS DEFLATE "%{CONTENT_TYPE} =~ m#^text/#"
FilterChain COMPRESS
CookieName atlas_session
CookieExpires "1 weeks"
CookieTracking On
SSLCompression Off
