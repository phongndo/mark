# Mark application configuration
# This hand-written corpus exercises the complete vendored INI grammar.
; This grammar also recognizes hash and semicolon comments after value text.
  # Spaces before a hash comment receive the leading-whitespace scope.
	; A tab before a semicolon comment does too.

[application]
name = "Mark"
display_name = 'Mark Syntax Preview'
release-channel = stable
version = 1.4.0
build_2026 = 20260712
enabled = true
empty_value =
summary = plain values remain unquoted
homepage = https://example.test/mark#overview
support = mailto:help@example.test

[paths]
workspace = '/srv/mark/work trees'
cache = "C:\Users\Public\Mark\cache"
unix_socket = /tmp/mark.sock
relative.path = ./fixtures/textmate/ini
parent-path = ../shared/assets
underscore_key = /var/lib/mark_data
dot.key.with.parts = accepted
mixed-key_name.2 = accepted
0 = numeric key
9patch = starts with a digit

[quoting]
single = 'a single-quoted value'
double = "a double-quoted value"
apostrophe = 'D\'Arcy'
backslash = 'one\\two'
escape_tab = 'before\tafter'
escape_hash = 'literal\#marker'
escape_semicolon = 'literal\;marker'
escape_equals = 'left\=right'
double_backslashes = "C:\Program Files\Mark"
double_unicode = "naïve café — 東京"
single_unicode = 'Καλημέρα κόσμε'
empty_single = ''
empty_double = ""

[comments]
# A hash comment with =, [section], 'quotes', and "quotes".
; A semicolon comment with path C:\temp and emoji 📝.
    # Four leading spaces are captured separately.
		; Two leading tabs are captured separately.
value = text # this hash begins an inline comment in the vendored grammar
other = text ; this semicolon also begins an inline comment
url = https://example.test/page#fragment becomes comment-scoped
color = #7f5af0 is likewise treated as a comment
quoted_markers = '# not a comment; still a string'
after = comments do not consume the next line

[network]
host = 127.0.0.1
port = 8080
protocol = https
timeout.seconds = 30
retry-count = 5
retry_backoff = 1.5
ipv6 = ::1
endpoint = "https://例え.test/api/v2"
user_agent = 'mark/1.4 (test\; oracle)'
proxy =

[database.primary]
driver = sqlite
file = './state/mark.db'
journal_mode = WAL
busy-timeout = 5000
read_only = false
pragma.foreign_keys = on
query = 'select * from files where kind\=\'ini\''

[database.replica-1]
driver = postgres
host = db.internal
port = 5432
database = mark_preview
username = readonly
password = 'p@ss\'word\\demo'
ssl-mode = require

[locale]
default = en-US
fallback = pt-BR
greeting = "Olá, 世界 👋🏽"
japanese = '設定を読み込みました'
arabic = "مرحبًا بالعالم"
devanagari = 'नमस्ते दुनिया'
combining = "Café"
astral = "rocket 🚀 and clef 𝄞"

[feature-flags]
syntax.highlight = true
syntax.minimap = false
syntax.injections = experimental
ui-command-palette = enabled
ui_status_bar = enabled
files.1 = basic.ini
files.2 = stress.ini
rollout-percent = 25

[profile "work"]
theme = "light"
font_family = 'JetBrains Mono'
font_size = 14
tab_width = 4
insert_spaces = true
trim-trailing-whitespace = true

[profile "日本語"]
theme = "夜"
font_family = '源ノ角ゴシック'
welcome = "編集を始めましょう"
author = 山田太郎

[profile "emoji-🚀"]
badge = "🧪"
description = 'Unicode outside the BMP tests UTF-16 offsets'
status = ready

[key-shapes]
UPPER = uppercase
lower = lowercase
Mixed_Case = mixed
hyphen-key = hyphen
dot.key = dot
under_score = underscore
123 = digits
v2.endpoint = /api/v2
a-b_c.d9 = all allowed punctuation
space around key = only the final word before equals is the definition

[grammar-boundaries]
plain text without assignment
colon: is not an equals separator
= value without a key
key = value=with=extra=equals
key2    =    padded
key3=	 tabbed
inline_section = [not-a-section]
trailing_section = value [still-not-a-section]
.leading = the leading dot is outside the captured key
-leading = the leading hyphen is outside the captured key
trailing. = a trailing dot prevents a key match
trailing- = a trailing hyphen prevents a key match
  [indented-section]
[]
[first] trailing text is outside the section scope
[first]second] the section scope stops at the first closing bracket
double_quote_boundaries = "left \"middle\" right"
[section with spaces]
section_value = recognized
[dotted.section-name]
dotted = recognized
[underscored_section]
underscored = recognized

[multiline-specialty]
single_note = 'The grammar permits a single-quoted string
to continue across physical lines, including = and [brackets],
until an unescaped closing quote appears here.'
after_single = ordinary tokenization resumes
double_note = "The double-quoted rule can likewise continue
over a newline and preserve non-ASCII text such as Zürich,
ending when the next double quote appears."
after_double = ordinary tokenization resumes again

[escape-specialty]
known-looking = 'newline\n carriage\r tab\t'
punctuation = 'quote\' slash\\ equals\= bracket\]'
unicode_escape_text = 'literal\u263A is scoped as one escape pair'
double_has_no_escape_rule = "backslashes \n \t stay in the string scope"

; Closing comments verify that multiline string state was balanced.
   # Indented hash comment after every specialty.
[final]
checksum = sha256:0123456789abcdef
generated_by = 'hand-written fixture'
complete = yes
