# Shared client defaults for the Zürich engineering team 🚀
Host *
    AddKeysToAgent yes
    ServerAliveInterval 45
    ServerAliveCountMax 3
    LogLevel INFO

// Route production traffic through the hardened bastion
Host bastion-prod
    HostName 203.0.113.10
    User deploy
    Port 22
    IdentityFile ~/.ssh/id_ed25519
    IdentitiesOnly yes

Host app-?.example.net 東京-🚀
    ProxyJump bastion-prod
    User appuser
    ConnectTimeout 12
    StrictHostKeyChecking yes
    RemoteForward 9000 127.0.0.1:9000

# Minimal server policy excerpt
ListenAddress 192.0.2.44
PermitRootLogin no
PasswordAuthentication no
PubkeyAuthentication yes
LogLevel VERBOSE
SyslogFacility AUTH
Subsystem sftp internal-sftp
