# OpenSSH syntax stress fixture: client and server excerpts
# Fleet: München, 東京, and orbital relay 🚀
Include ~/.ssh/conf.d/*.conf
IgnoreUnknown UseKeychain,UpdateHostKeys

Host *
    AddressFamily any
    BatchMode no
    CanonicalizeHostname no
    CheckHostIP yes
    Compression yes
    ConnectTimeout 20
    ConnectionAttempts 3
    HashKnownHosts yes
    ServerAliveInterval 30
    ServerAliveCountMax 4
    TCPKeepAlive yes
    UpdateHostKeys yes
    VisualHostKey no
    LogLevel INFO
// Developer workstation defaults
Host dev-*.corp.example !dev-retired.corp.example
    User engineer
    Port 2222
    PreferredAuthentications publickey,keyboard-interactive
    IdentityFile ~/.ssh/id_ed25519
    IdentityFile ~/.ssh/id_ecdsa
    IdentitiesOnly yes
    AddKeysToAgent yes
    ForwardAgent no
    ForwardX11 yes
    ForwardX11Trusted no
    ForwardX11Timeout 600
    SendEnv LANG LC_*
    RequestTTY auto
    RemoteCommand tmux attach -t work
# Production uses a fixed-address jump host
Host prod-bastion
    HostName 198.51.100.14
    User access
    Port 22
    BindAddress 192.0.2.25
    IdentityAgent $SSH_AUTH_SOCK
    CertificateFile ~/.ssh/access-cert.pub
    FingerprintHash SHA256
    KexAlgorithms curve25519-sha256
    Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com
    MACs hmac-sha2-512-etm@openssh.com
    RekeyLimit 1G 3600
    StrictHostKeyChecking yes
    VerifyHostKeyDNS no

Host prod-api-01 prod-api-02
    HostName 203.0.113.80
    User deploy
    ProxyJump prod-bastion
    ProxyUseFdpass no
    LocalForward 15432 10.20.30.40:5432
    RemoteForward 9443 127.0.0.1:443
    ExitOnForwardFailure yes
    ClearAllForwardings no
    PermitLocalCommand yes
    LocalCommand printf 'connected to %h\n'
// SOCKS tunnel for incident response
Host incident-tunnel
    HostName 203.0.113.99
    ProxyCommand ssh -W %h:%p prod-bastion
    DynamicForward 127.0.0.1:1080
    GatewayPorts no
    ControlMaster auto
    ControlPath ~/.ssh/cm-%C
    ControlPersist 600
    StreamLocalBindMask 0177
    StreamLocalBindUnlink yes

Host files-東京.example.net archive-🚀
    User backup
    HostKeyAlias files-primary
    GlobalKnownHostsFile /etc/ssh/ssh_known_hosts
    UserKnownHostsFile ~/.ssh/known_hosts_archive
    HostKeyAlgorithms ssh-ed25519
    PubkeyAcceptedKeyTypes ssh-ed25519
    NoHostAuthenticationForLocalhost no
    NumberOfPasswordPrompts 1
    EscapeChar none

# Server listener and host identity policy
Port 22
ListenAddress 0.0.0.0
ListenAddress 192.0.2.60
AddressFamily any
Protocol 2
PidFile /run/sshd.pid
HostKey /etc/ssh/ssh_host_ed25519_key
HostCertificate /etc/ssh/ssh_host_ed25519_key-cert.pub
StrictModes yes
LoginGraceTime 45
MaxAuthTries 5
MaxSessions 12
MaxStartups 10:30:60

// Authentication controls
PermitRootLogin no
PermitEmptyPasswords no
PasswordAuthentication no
PubkeyAuthentication yes
KbdInteractiveAuthentication yes
ChallengeResponseAuthentication no
AuthenticationMethods publickey,keyboard-interactive
AuthorizedKeysFile .ssh/authorized_keys .ssh/authorized_keys2
AuthorizedPrincipalsFile /etc/ssh/principals/%u
AuthorizedKeysCommand /usr/local/bin/lookup-keys
AuthorizedKeysCommandUser nobody
HostbasedAuthentication no
IgnoreRhosts yes
UsePAM yes

# Network forwarding and session behavior
AllowAgentForwarding no
AllowTcpForwarding local
AllowStreamLocalForwarding yes
DisableForwarding no
GatewayPorts no
PermitOpen 10.20.30.40:5432
PermitTTY yes
PermitTunnel no
X11Forwarding no
X11DisplayOffset 10
X11UseLocalhost yes

// Logging, environment, and subsystem setup
SyslogFacility AUTHPRIV
LogLevel VERBOSE
PrintMotd no
PrintLastLog yes
AcceptEnv LANG LC_*
PermitUserEnvironment no
UseDNS no
VersionAddendum none
Banner /etc/issue.net
ChrootDirectory none
ForceCommand internal-sftp
Subsystem sftp internal-sftp

# Access rules are intentionally mixed for scope coverage
AllowUsers deploy backup ops@192.0.2.0/24
DenyUsers guest legacy
AllowGroups ssh-users sftp-users
DenyGroups suspended
TrustedUserCAKeys /etc/ssh/user_ca.pub
RevokedKeys /etc/ssh/revoked_keys
ExposeAuthInfo yes

Match User backup
    ChrootDirectory /srv/backup/%u
    ForceCommand internal-sftp
    PasswordAuthentication no
    PermitTTY no
    AllowTcpForwarding no
    X11Forwarding no

Match Address 198.51.100.0/24
    AuthenticationMethods publickey
    MaxAuthTries 2
    Banner /etc/issue-partner
