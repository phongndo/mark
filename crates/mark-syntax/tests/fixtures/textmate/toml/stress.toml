# Every basic-string escape accepted by TOML, plus direct Unicode.
escaped = "backspace:\b tab:\t newline:\n formfeed:\f return:\r quote:\" slash:\\"
unicode_escapes = "lambda=\u03BB, rocket=\U0001F680"
literal_path = 'C:\Program Files\Mark\bin'
literal_syntax = 'The sequence \n stays as two characters.'

description = """
This basic multiline string contains "quotes", café, and 🚀.
A continuation joins this sentence to \
    the next physical line without surrounding whitespace.
Escapes still work here: \t tab, \u03BB lambda, and \\ backslash.
"""

verbatim_notice = '''
Literal multiline strings keep C:\tmp\new and "double quotes" unchanged.
They can include # hash marks and Unicode such as 日本語 and 🧭.
'''

